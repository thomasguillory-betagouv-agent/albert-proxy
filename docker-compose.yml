services:
  albert-proxy:
    build: .
    container_name: albert-proxy
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      - ALBERT_BASE_URL=${ALBERT_BASE_URL:-https://albert.api.etalab.gouv.fr/v1}
      - PROXY_TIMEOUT=${PROXY_TIMEOUT:-300}
      - PROXY_DEBUG=${PROXY_DEBUG:-0}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
